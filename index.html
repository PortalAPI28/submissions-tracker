<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gotham Full Send</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #0e1117;
  --card: #151921;
  --card-hover: #1a2030;
  --border: #252d3a;
  --border-focus: #58a6ff;
  --text: #e6edf3;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-dim: rgba(88,166,255,0.10);
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.10);
  --yellow: #d29922;
  --yellow-dim: rgba(210,153,34,0.10);
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.10);
  --orange: #db6d28;
  --purple: #a371f7;
  --purple-dim: rgba(163,113,247,0.10);
  --input-bg: #0d1117;
  --radius: 6px;
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;}

/* --- Sidebar --- */
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-logo{font-size:15px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.sidebar-logo span{color:var(--accent);}

/* Auth section */
.sidebar-auth{padding:10px 12px;border-bottom:1px solid var(--border);}
.auth-btn{width:100%;font-family:var(--font);font-size:11px;font-weight:600;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:6px;justify-content:center;}
.auth-btn:hover{background:var(--card-hover);border-color:var(--text-muted);}
.auth-btn.signed-in{border-color:var(--green);background:var(--green-dim);color:var(--green);cursor:default;}
.auth-user{font-size:10px;color:var(--text-muted);text-align:center;margin-top:5px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.sidebar-actions{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;}

.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{background:var(--card-hover);border-color:var(--text-muted);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#4090e0;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-danger{color:var(--red);border-color:transparent;background:var(--red-dim);}
.btn-danger:hover{background:rgba(248,81,73,0.2);}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text-muted);}
.btn-ghost:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.btn-full{width:100%;justify-content:center;}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;font-size:14px;padding:12px 20px;border-radius:8px;cursor:pointer;transition:all 0.15s;font-weight:700;width:100%;justify-content:center;display:flex;align-items:center;gap:8px;}
.btn-send:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(88,166,255,0.3);}
.btn-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.deal-list{flex:1;overflow-y:auto;padding:6px 8px;}
.deal-list::-webkit-scrollbar{width:4px;}
.deal-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.deal-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.1s;border:1px solid transparent;margin-bottom:2px;}
.deal-item:hover{background:var(--card-hover);}
.deal-item.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.deal-item .deal-biz{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.deal-item .deal-date{font-size:10px;color:var(--text-muted);font-family:var(--mono);}
.deal-item .deal-close{display:none;font-size:14px;color:var(--text-muted);padding:2px 4px;border-radius:3px;line-height:1;}
.deal-item:hover .deal-close{display:block;}
.deal-item .deal-close:hover{background:var(--red-dim);color:var(--red);}

.deal-stats{display:flex;gap:6px;margin-top:3px;}
.deal-pip{font-size:9px;font-family:var(--mono);font-weight:600;padding:1px 5px;border-radius:3px;}
.pip-y{background:var(--yellow-dim);color:var(--yellow);}
.pip-g{background:var(--green-dim);color:var(--green);}
.pip-r{background:var(--red-dim);color:var(--red);}

.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted);}

/* --- Main Panel --- */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.tab-bar{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px;min-height:38px;overflow-x:auto;gap:2px;}
.tab-bar::-webkit-scrollbar{height:0;}
.tab{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-muted);transition:all 0.12s;white-space:nowrap;}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab .tab-close{font-size:13px;margin-left:2px;padding:1px 3px;border-radius:3px;opacity:0;transition:opacity 0.1s;}
.tab:hover .tab-close{opacity:1;}
.tab .tab-close:hover{background:var(--red-dim);color:var(--red);}
.tab-dash{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.12s;}
.tab-dash:hover{color:var(--text);}
.tab-dash.active{color:var(--accent);border-bottom-color:var(--accent);}

.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ===== DASHBOARD ===== */
.dash{max-width:900px;margin:0 auto;}
.dash-hero{margin-bottom:32px;}
.dash-hero h2{font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px;}
.dash-hero p{color:var(--text-muted);font-size:14px;}

.stats-row{display:flex;gap:12px;margin-bottom:28px;}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-card .stat-val{font-size:28px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;}
.stat-card .stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
.stat-accent{color:var(--accent);}
.stat-yellow{color:var(--yellow);}
.stat-green{color:var(--green);}
.stat-red{color:var(--red);}

.dash-table{width:100%;border-collapse:collapse;}
.dash-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.dash-table td{padding:10px 12px;border-bottom:1px solid rgba(37,45,58,0.5);cursor:pointer;transition:background 0.1s;}
.dash-table tr:hover td{background:rgba(88,166,255,0.04);}
.dash-table .dt-biz{font-weight:600;font-size:13px;}
.dash-table .dt-date{font-family:var(--mono);font-size:12px;color:var(--text-muted);}
.dash-table .dt-state{font-family:var(--mono);font-size:12px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text);}

/* ===== DEAL FORM ===== */
.deal-view{max-width:1100px;margin:0 auto;}
.deal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.deal-header h2{font-size:20px;font-weight:700;letter-spacing:-0.4px;}
.deal-header-actions{display:flex;gap:8px;}

.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:14px;}

/* Email section accent */
.section-email{border-color:rgba(163,113,247,0.3);}
.section-email .section-title{color:var(--purple);}

.fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
.field label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field select,.field textarea{width:100%;font-family:var(--mono);font-size:12px;padding:6px 9px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color 0.15s;}
.field textarea{resize:vertical;min-height:60px;font-family:var(--mono);font-size:12px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-dim);}
.field input::placeholder,.field textarea::placeholder{color:#3a414a;}
.field-wide{grid-column:span 2;}

.rev-table{width:100%;border-collapse:collapse;font-size:12px;}
.rev-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);}
.rev-table td{padding:3px 4px;border-bottom:1px solid var(--border);}
.rev-table input{width:100%;font-family:var(--mono);font-size:12px;padding:4px 7px;background:var(--input-bg);border:1px solid transparent;border-radius:4px;color:var(--text);outline:none;}
.rev-table input:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-dim);}
.rev-table .row-label{width:34px;padding:3px 4px;}
.rev-table .row-label input{width:28px;text-align:center;font-family:var(--mono);font-size:11px;padding:4px 2px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);outline:none;}
.rev-table .row-label input:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-dim);color:var(--text);}

.inline-group{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.radio-group{display:flex;gap:4px;}
.radio-group label{font-size:12px;font-weight:500;padding:4px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--input-bg);transition:all 0.12s;color:var(--text-muted);}
.radio-group input{display:none;}
.radio-group input:checked+label{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);background:rgba(255,255,255,0.02);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-top:10px;}
.drop-zone:hover{background:rgba(88,166,255,0.04);border-color:var(--accent);}
.drop-zone.dragover{background:rgba(88,166,255,0.08);border-color:var(--accent);}
.drop-zone p{font-size:12px;color:var(--text-muted);font-weight:500;}
.file-item{display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:6px 10px;border-radius:6px;margin-top:6px;border:1px solid var(--border);}
.file-item span{font-size:11px;font-family:var(--mono);color:var(--text);}
.file-remove{background:var(--red-dim);color:var(--red);border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-weight:700;font-size:12px;}
.file-remove:hover{background:rgba(248,81,73,0.25);}

/* Lender table */
.risk-header{font-size:12px;font-weight:700;padding:8px 10px;border-radius:var(--radius);margin:10px 0 4px 0;display:flex;align-items:center;gap:7px;}
.risk-header::before{content:'';width:7px;height:7px;border-radius:50%;}
.risk-low{background:var(--green-dim);color:var(--green);}
.risk-mid{background:var(--yellow-dim);color:var(--yellow);}
.risk-high{background:var(--red-dim);color:var(--red);}
.risk-low::before{background:var(--green);}
.risk-mid::before{background:var(--yellow);}
.risk-high::before{background:var(--red);}

.lender-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.lender-table th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);}
.lender-table td{padding:4px 8px;border-bottom:1px solid rgba(37,45,58,0.4);vertical-align:top;}
.lender-table tr{cursor:pointer;transition:background 0.12s;user-select:none;}
.lender-table tr:hover td{background:rgba(88,166,255,0.04);}

.lender-table tr.sent td{background:var(--yellow-dim);}
.lender-table tr.sent .lender-name{color:var(--yellow);}
.lender-table tr.sent:hover td{background:rgba(210,153,34,0.16);}

.lender-table tr.approved td{background:var(--green-dim);}
.lender-table tr.approved .lender-name{color:var(--green);}
.lender-table tr.approved:hover td{background:rgba(63,185,80,0.16);}

.lender-table tr.declined td{background:var(--red-dim);}
.lender-table tr.declined .lender-name{color:var(--red);}
.lender-table tr.declined:hover td{background:rgba(248,81,73,0.16);}

.lender-table tr.funded td{background:var(--accent-dim);}
.lender-table tr.funded .lender-name{color:var(--accent);}
.lender-table tr.funded:hover td{background:rgba(88,166,255,0.16);}

.lender-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lender-email{font-family:var(--mono);font-size:10px;color:var(--text-muted);word-break:break-all;}
.lender-exempt{font-size:10px;color:var(--yellow);}
.portal-badge{font-size:8px;font-family:var(--mono);background:var(--purple-dim);color:var(--purple);padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:700;}

.col-name{width:16%;}
.col-email{width:35%;}
.col-exempt{width:16%;}
.col-status{width:33%;}

.lender-table .status-input{width:100%;font-family:var(--font);font-size:11px;padding:3px 7px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text);outline:none;transition:all 0.12s;}
.lender-table .status-input:hover{border-color:var(--border);background:var(--input-bg);}
.lender-table .status-input:focus{border-color:var(--border-focus);background:var(--input-bg);box-shadow:0 0 0 2px var(--accent-dim);}

/* Context menu */
.ctx-menu{position:fixed;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:none;min-width:150px;animation:fadeIn 0.1s ease-out;}
.ctx-menu.show{display:block;}
.ctx-menu button{display:flex;align-items:center;gap:7px;width:100%;padding:7px 11px;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;transition:background 0.1s;}
.ctx-menu button:hover{background:rgba(255,255,255,0.06);}
.ctx-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ctx-dot-green{background:var(--green);}
.ctx-dot-red{background:var(--red);}
.ctx-dot-clear{background:var(--text-muted);}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;font-weight:600;font-size:12px;padding:8px 18px;border-radius:var(--radius);opacity:0;transform:translateY(10px);transition:all 0.25s;pointer-events:none;z-index:300;background:var(--green);color:#fff;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}

/* Legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;padding:8px 0;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.ld-y{background:var(--yellow-dim);border:1px solid var(--yellow);}
.ld-g{background:var(--green-dim);border:1px solid var(--green);}
.ld-r{background:var(--red-dim);border:1px solid var(--red);}

/* Sync indicator */
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--text-muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.offline{background:var(--red);}

/* Rep tabs */
.rep-tabs{padding:6px 8px 2px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:3px;}
.rep-tab{font-family:var(--font);font-size:11px;font-weight:600;padding:5px 10px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.rep-tab:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.rep-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.rep-tab .rep-count{font-family:var(--mono);font-size:9px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px;margin-left:3px;}
.rep-tab.active .rep-count{background:rgba(88,166,255,0.2);}

/* Overlays */
.reps-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.reps-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:420px;width:90%;}
.reps-box h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.rep-list-manage{margin-bottom:14px;}
.rep-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.rep-row span{flex:1;font-size:13px;font-weight:500;}
.rep-row .btn{padding:3px 8px;font-size:10px;}
.add-rep-row{display:flex;gap:6px;margin-top:10px;}
.add-rep-row input{flex:1;font-family:var(--font);font-size:13px;padding:7px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;}
.add-rep-row input:focus{border-color:var(--border-focus);}

/* Progress bar */
.progress-section{margin-top:14px;display:none;}
.progress-bar{width:100%;height:24px;background:var(--input-bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;font-family:var(--mono);}
.progress-text{text-align:center;color:var(--text-muted);font-size:11px;font-weight:600;margin-top:6px;}

/* Send results */
.send-results{margin-top:12px;padding:12px;border-radius:8px;font-size:11px;font-family:var(--mono);}
.send-results.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(63,185,80,0.2);}
.send-results.partial{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(210,153,34,0.2);}
.send-results .failed-list{margin-top:6px;color:var(--red);}

/* Approval overlay */
.approval-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn 0.15s ease-out;}
.approval-box{background:var(--card);border:1px solid var(--green);border-radius:14px;padding:24px;max-width:400px;width:90%;animation:fadeIn 0.15s ease-out;}
.approval-box h3{font-size:15px;font-weight:700;color:var(--green);margin-bottom:2px;}
.approval-box .approval-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px;}
.approval-box .approval-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.approval-box .approval-grid .field label{font-size:10px;}
.approval-box .approval-grid .field input{font-size:13px;padding:7px 9px;}
.approval-btns{display:flex;gap:8px;justify-content:flex-end;}
.approval-btns .btn{padding:8px 16px;}
.btn-approve{background:var(--green-dim);color:var(--green);border-color:var(--green);}
.btn-approve:hover{background:rgba(63,185,80,0.2);}
.btn-funded{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
.btn-funded:hover{background:rgba(88,166,255,0.2);}

/* Funded overlay */

const LS_KEY = 'gotham_deals';
const LS_TABS = 'gotham_active_view';
const LS_REPS = 'gotham_reps';

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) deals = JSON.parse(raw);
    const av = localStorage.getItem(LS_TABS);
    if (av) activeView = av;
    const r = localStorage.getItem(LS_REPS);
    if (r) reps = JSON.parse(r);
  } catch(e) {}
}

function saveLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(deals));
    localStorage.setItem(LS_TABS, activeView);
    localStorage.setItem(LS_REPS, JSON.stringify(reps));
  } catch(e) {}
}

function saveToFirebase() {
  if (!firebaseUrl) return;
  fetch(firebaseUrl + '/deals.json', { method: 'PATCH', body: JSON.stringify(deals), headers: {'Content-Type': 'application/json'} })
    .then(() => setSyncStatus(true)).catch(() => setSyncStatus(false));
  fetch(firebaseUrl + '/reps.json', { method: 'PUT', body: JSON.stringify(reps), headers: {'Content-Type': 'application/json'} }).catch(() => {});
}

function deleteDealFromFirebase(id) {
  if (!firebaseUrl) return;
  fetch(firebaseUrl + '/deals/' + id + '.json', { method: 'DELETE' }).catch(() => {});
}

function loadFromFirebase(cb) {
  if (!firebaseUrl) { cb(); return; }
  Promise.all([
    fetch(firebaseUrl + '/deals.json').then(r => r.json()),
    fetch(firebaseUrl + '/reps.json').then(r => r.json())
  ]).then(([dealsData, repsData]) => {
    if (dealsData && typeof dealsData === 'object') {
      const localOnly = {};
      Object.keys(deals).forEach(k => { if (!dealsData[k]) localOnly[k] = deals[k]; });
      deals = Object.assign({}, dealsData, localOnly);
    }
    if (Array.isArray(repsData) && repsData.length) reps = repsData;
    setSyncStatus(true);
    saveLocal();
    cb();
  }).catch(() => { setSyncStatus(false); cb(); });
}

function persist() { saveLocal(); saveToFirebase(); }

function setSyncStatus(online) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (!firebaseUrl) { txt.textContent = 'Local mode'; dot.className = 'sync-dot offline'; return; }
  dot.className = online ? 'sync-dot' : 'sync-dot offline';
  txt.textContent = online ? 'Synced' : 'Offline';
}

/* ============================================================
   MICROSOFT AUTH
   ============================================================ */
async function authenticate() {
  const btn = document.getElementById('auth-btn');
  const userEl = document.getElementById('auth-user');
  btn.textContent = 'Signing in...';
  try {
    const resp = await msalInstance.loginPopup({ scopes: ['Mail.Send','User.Read'], prompt: 'select_account' });
    const email = resp.account.username.toLowerCase();
    if (!email.endsWith('@gothamcapitalfunding.com')) {
      btn.textContent = 'Sign in with Microsoft';
      userEl.textContent = 'Not authorized';
      accessToken = null;
      alert('Access Denied: Only @gothamcapitalfunding.com emails are authorized.');
      return;
    }
    accessToken = resp.accessToken;
    signedInUser = resp.account;
    sessionStorage.setItem('msalToken', accessToken);
    btn.textContent = '● Signed In';
    btn.classList.add('signed-in');
    userEl.textContent = email;
  } catch(e) {
    console.error('Auth error:', e);
    btn.textContent = 'Sign in with Microsoft';
    userEl.textContent = 'Sign-in failed';
  }
}

async function ensureToken() {
  if (!signedInUser) return null;
  try {
    const resp = await msalInstance.acquireTokenSilent({ scopes: ['Mail.Send','User.Read'], account: signedInUser });
    accessToken = resp.accessToken;
    return accessToken;
  } catch(e) {
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: ['Mail.Send','User.Read'] });
      accessToken = resp.accessToken;
      return accessToken;
    } catch(e2) {
      console.error('Token refresh failed:', e2);
      return null;
    }
  }
}

// Restore session
(function() {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length) {
    signedInUser = accounts[0];
    const email = signedInUser.username.toLowerCase();
    if (email.endsWith('@gothamcapitalfunding.com')) {
      document.getElementById('auth-btn').textContent = '● Signed In';
      document.getElementById('auth-btn').classList.add('signed-in');
      document.getElementById('auth-user').textContent = email;
      msalInstance.acquireTokenSilent({ scopes: ['Mail.Send','User.Read'], account: signedInUser })
        .then(r => { accessToken = r.accessToken; })
        .catch(() => {});
    }
  }
})();

function newDealData() {
  const id = 'deal_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  return { id, rep: '', fields: {}, courts: '', rev: {}, lenders: {}, lenderStates: {}, emailFields: {}, emailedLenders: [], approvalData: {}, fundedData: {}, created: new Date().toISOString() };
}

function createDeal() {
  const d = newDealData();
  deals[d.id] = d;
  openTab(d.id);
  persist();
  renderSidebar();
}

function deleteDeal(id) {
  if (!confirm('Delete this deal permanently?')) return;
  delete deals[id];
  delete dealFiles[id];
  openTabs = openTabs.filter(t => t !== id);
  if (activeView === id) showDashboard();
  saveLocal();
  deleteDealFromFirebase(id);
  renderSidebar();
  renderTabBar();
}

function getDealLabel(d) { return d.fields?.business || 'Untitled Deal'; }

function isDealFunded(d) {
  if (!d.lenderStates) return false;
  return Object.values(d.lenderStates).some(v => v === 'funded');
}

function getDealPips(d) {
  let s=0,a=0,dec=0,f=0;
  if (d.lenderStates) Object.values(d.lenderStates).forEach(v => { if(v==='sent')s++; if(v==='approved')a++; if(v==='declined')dec++; if(v==='funded')f++; });
  return {sent:s,approved:a,declined:dec,funded:f};
}

  const container = document.getElementById('rep-tabs');
  const allCount = Object.keys(deals).length;
  let html = `<button class="rep-tab${selectedRep===null?' active':''}" onclick="selectRep(null)">All<span class="rep-count">${allCount}</span></button>`;
  reps.forEach(r => {
    const count = Object.values(deals).filter(d => d.rep === r).length;
    html += `<button class="rep-tab${selectedRep===r?' active':''}" onclick="selectRep('${esc(r)}')">${esc(r)}<span class="rep-count">${count}</span></button>`;
  });
  const unassigned = Object.values(deals).filter(d => !d.rep).length;
  if (unassigned && reps.length) html += `<button class="rep-tab${selectedRep==='__unassigned__'?' active':''}" onclick="selectRep('__unassigned__')">Unassigned<span class="rep-count">${unassigned}</span></button>`;
  container.innerHTML = html;
}

function selectRep(rep) { selectedRep = rep; renderRepTabs(); renderSidebar(); if (activeView==='dashboard') renderDashboard(); }

function getFilteredDeals() {
  let list = Object.values(deals).filter(d => !isDealFunded(d)); // exclude funded from active
  if (selectedRep==='__unassigned__') list = list.filter(d => !d.rep);
  else if (selectedRep) list = list.filter(d => d.rep === selectedRep);
  return list.sort((a,b) => b.created.localeCompare(a.created));
}

function getFundedDeals() {
  return Object.values(deals).filter(d => isDealFunded(d)).sort((a,b) => b.created.localeCompare(a.created));
}

/* ============================================================
   UI — Sidebar
   ============================================================ */
function renderSidebar() {
  const list = document.getElementById('deal-list');
  const sorted = getFilteredDeals();
  const funded = getFundedDeals();

  let html = '';

  if (!sorted.length && !funded.length) {
    list.innerHTML = '<div class="empty-state" style="padding:30px 10px;"><p style="font-size:12px;">No deals yet</p></div>';
    return;
  }

  // Active deals
  html += sorted.map(d => {
    const pips = getDealPips(d);
    const isActive = activeView === d.id;
    return `<div class="deal-item${isActive?' active':''}" onclick="openTab('${d.id}')">
      <div style="flex:1;overflow:hidden;">
        <div class="deal-biz">${esc(getDealLabel(d))}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
          <span class="deal-date">${d.fields?.date||'—'}</span>
          ${d.rep?`<span style="font-size:10px;color:var(--accent);font-weight:600;">${esc(d.rep)}</span>`:''}
          <span class="deal-stats">
            ${pips.sent?`<span class="deal-pip pip-y">${pips.sent}</span>`:''}
            ${pips.approved?`<span class="deal-pip pip-g">${pips.approved}</span>`:''}
            ${pips.declined?`<span class="deal-pip pip-r">${pips.declined}</span>`:''}
          </span>
        </div>
      </div>
      <span class="deal-close" onclick="event.stopPropagation();deleteDeal('${d.id}')">&times;</span>
    </div>`;
  }).join('');

  // Funded deals
  if (funded.length) {
    html += `<div style="padding:8px 4px 4px;margin-top:6px;border-top:1px solid var(--border);"><span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);">Funded</span></div>`;
    html += funded.map(d => {
      const pips = getDealPips(d);
      const isActive = activeView === d.id;
      return `<div class="deal-item${isActive?' active':''}" onclick="openTab('${d.id}')" style="opacity:0.7;">
        <div style="flex:1;overflow:hidden;">
          <div class="deal-biz" style="color:var(--accent);">${esc(getDealLabel(d))}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
            <span class="deal-date">${d.fields?.date||'—'}</span>
            ${d.rep?`<span style="font-size:10px;color:var(--accent);font-weight:600;">${esc(d.rep)}</span>`:''}
            <span class="deal-pip" style="background:var(--accent-dim);color:var(--accent);">${pips.funded}F</span>
          </div>
        </div>
        <span class="deal-close" onclick="event.stopPropagation();deleteDeal('${d.id}')">&times;</span>
      </div>`;
    }).join('');
  }

  list.innerHTML = html;
}

/* ============================================================
   UI — Tab Bar
   ============================================================ */
function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = `<div class="tab-dash${activeView==='dashboard'?' active':''}" onclick="showDashboard()">Dashboard</div>` +
    `<div class="tab-dash${activeView==='funded'?' active':''}" onclick="showFunded()">Funded</div>`;
}

function openTab(id) { activeView=id; saveLocal(); renderSidebar(); renderTabBar(); renderDealView(id); }
function switchTab(id) { activeView=id; saveLocal(); renderSidebar(); renderTabBar(); renderDealView(id); }
function showDashboard() { if(activeView!=='dashboard'&&activeView!=='funded'&&deals[activeView])saveDealFromDOM(activeView); activeView='dashboard'; saveLocal(); renderRepTabs(); renderSidebar(); renderTabBar(); renderDashboard(); }
function showFunded() { if(activeView!=='dashboard'&&activeView!=='funded'&&deals[activeView])saveDealFromDOM(activeView); activeView='funded'; saveLocal(); renderSidebar(); renderTabBar(); renderFundedView(); }

/* ============================================================
   UI — Dashboard
   ============================================================ */
function renderDashboard() {
  const c = document.getElementById('content');
  const activeDeals = Object.values(deals).filter(d => !isDealFunded(d)).sort((a,b) => b.created.localeCompare(a.created));
  let totalSent=0,totalApproved=0,totalDeclined=0;
  activeDeals.forEach(d => { const p=getDealPips(d); totalSent+=p.sent; totalApproved+=p.approved; totalDeclined+=p.declined; });

  // Rep performance (active deals only)
  let repStatsHtml = '';
  if (reps.length) {
    const repRows = reps.map(r => {
      const rd = activeDeals.filter(d => d.rep===r); let rs=0,ra=0,rdd=0;
      rd.forEach(d => { const p=getDealPips(d); rs+=p.sent; ra+=p.approved; rdd+=p.declined; });
      return `<tr><td style="font-weight:600;font-size:13px;cursor:pointer;" onclick="selectRep('${esc(r)}')">${esc(r)}</td><td><span class="deal-pip" style="background:var(--accent-dim);color:var(--accent);">${rd.length}</span></td><td><span class="deal-pip pip-y">${rs}</span></td><td><span class="deal-pip pip-g">${ra}</span></td><td><span class="deal-pip pip-r">${rdd}</span></td></tr>`;
    }).join('');
    const unDeals = activeDeals.filter(d => !d.rep); let us=0,ua=0,ud=0;
    unDeals.forEach(d => { const p=getDealPips(d); us+=p.sent; ua+=p.approved; ud+=p.declined; });
    const unRow = unDeals.length ? `<tr style="color:var(--text-muted);"><td style="font-size:13px;cursor:pointer;" onclick="selectRep('__unassigned__')">Unassigned</td><td><span class="deal-pip" style="background:rgba(255,255,255,0.05);color:var(--text-muted);">${unDeals.length}</span></td><td><span class="deal-pip pip-y">${us}</span></td><td><span class="deal-pip pip-g">${ua}</span></td><td><span class="deal-pip pip-r">${ud}</span></td></tr>` : '';
    repStatsHtml = `<div class="section" style="margin-bottom:20px;"><div class="section-title">Rep Performance</div><table class="dash-table"><thead><tr><th>Rep</th><th>Deals</th><th>Sent</th><th>Approved</th><th>Declined</th></tr></thead><tbody>${repRows}${unRow}</tbody></table></div>`;
  }

  // Gather all approvals with data
  const approvals = [];
  const allLendersFlat = [];
  Object.entries(LENDERS).forEach(([risk, list]) => {
    list.forEach((l, i) => { allLendersFlat.push({ ...l, key: `${risk}-${i}` }); });
  });

  activeDeals.forEach(d => {
    if (!d.lenderStates || !d.approvalData) return;
    Object.entries(d.lenderStates).forEach(([lk, state]) => {
      if (state === 'approved' && d.approvalData[lk]) {
        const ad = d.approvalData[lk];
        const lender = allLendersFlat.find(l => l.key === lk);
        approvals.push({
          business: d.fields?.business || 'Untitled',
          lenderName: lender ? lender.name : lk,
          amount: ad.amount || '',
          term: ad.term || '',
          rate: ad.rate || '',
          payment: ad.payment || '',
          rep: d.rep || '—',
          dealId: d.id
        });
      }
    });
  });

  // Approval summary
  let totalApprovedAmt = 0;
  let rateSum = 0, rateCount = 0;
  approvals.forEach(a => {
    const num = parseFloat((a.amount||'').replace(/[^0-9.]/g,''));
    if (!isNaN(num)) totalApprovedAmt += num;
    const rate = parseFloat((a.rate||'').replace(/[^0-9.]/g,''));
    if (!isNaN(rate)) { rateSum += rate; rateCount++; }
  });
  const avgRate = rateCount ? (rateSum / rateCount).toFixed(2) : '—';
  const avgAmt = approvals.length ? Math.round(totalApprovedAmt / approvals.length).toLocaleString() : '—';

  let approvalsHtml = '';
  if (approvals.length) {
    approvalsHtml = `
    <div class="stats-row" style="margin-top:8px;">
      <div class="stat-card"><div class="stat-val stat-green">$${Math.round(totalApprovedAmt).toLocaleString()}</div><div class="stat-label">Total Approved</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text);">${approvals.length}</div><div class="stat-label">Approvals</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text);">$${avgAmt}</div><div class="stat-label">Avg. Amount</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text);">${avgRate}</div><div class="stat-label">Avg. Rate</div></div>
    </div>
    <div class="section" style="margin-bottom:20px;">
      <div class="section-title">Approval Details</div>
      <table class="dash-table">
        <thead><tr><th>Business</th><th>Lender</th><th>Amount</th><th>Term</th><th>Rate</th><th>Payment</th><th>Rep</th></tr></thead>
        <tbody>${approvals.map(a => `<tr onclick="openTab('${a.dealId}')">
          <td class="dt-biz">${esc(a.business)}</td>
          <td style="font-size:12px;">${esc(a.lenderName)}</td>
          <td style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600;">${esc(a.amount)}</td>
          <td style="font-family:var(--mono);font-size:12px;">${esc(a.term)}</td>
          <td style="font-family:var(--mono);font-size:12px;">${esc(a.rate)}</td>
          <td style="font-family:var(--mono);font-size:12px;">${esc(a.payment)}</td>
          <td style="font-size:12px;color:var(--accent);">${esc(a.rep)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  c.innerHTML = `<div class="dash"><div class="dash-hero"><h2>Gotham Full Send</h2><p>Track deals, send submissions, manage approvals — all in one place.</p></div>
    <div class="stats-row"><div class="stat-card"><div class="stat-val stat-accent">${activeDeals.length}</div><div class="stat-label">Active Deals</div></div><div class="stat-card"><div class="stat-val stat-yellow">${totalSent}</div><div class="stat-label">Sent</div></div><div class="stat-card"><div class="stat-val stat-green">${totalApproved}</div><div class="stat-label">Approved</div></div><div class="stat-card"><div class="stat-val stat-red">${totalDeclined}</div><div class="stat-label">Declined</div></div></div>
    ${repStatsHtml}
    ${approvalsHtml}
    ${!activeDeals.length ? `<div class="empty-state"><h3>No active deals</h3><p>Click <strong>+ New Deal</strong> to get started.</p></div>` : ''}
  </div>`;
}

/* ============================================================
   UI — Funded View
   ============================================================ */
function renderFundedView() {
  const c = document.getElementById('content');
  const fundedDeals = getFundedDeals();

  const allLendersFlat = [];
  Object.entries(LENDERS).forEach(([risk, list]) => {
    list.forEach((l, i) => { allLendersFlat.push({ ...l, key: `${risk}-${i}` }); });
  });

  // Gather funded entries
  const fundedEntries = [];
  fundedDeals.forEach(d => {
    if (!d.lenderStates || !d.fundedData) return;
    Object.entries(d.lenderStates).forEach(([lk, state]) => {
      if (state === 'funded' && d.fundedData[lk]) {
        const fd = d.fundedData[lk];
        const lender = allLendersFlat.find(l => l.key === lk);
        fundedEntries.push({
          business: d.fields?.business || 'Untitled',
          lenderName: lender ? lender.name : lk,
          amount: fd.amount || '',
          term: fd.term || '',
          rate: fd.rate || '',
          points: fd.points || '',
          commission: fd.commission || '',
          rep: d.rep || '—',
          dealId: d.id
        });
      }
    });
  });

  // Totals
  let totalFunded = 0, totalCommission = 0, pointsSum = 0, pointsCount = 0;
  fundedEntries.forEach(f => {
    const amt = parseFloat((f.amount||'').replace(/[^0-9.]/g,''));
    if (!isNaN(amt)) totalFunded += amt;
    const comm = parseFloat((f.commission||'').replace(/[^0-9.]/g,''));
    if (!isNaN(comm)) totalCommission += comm;
    const pts = parseFloat((f.points||'').replace(/[^0-9.]/g,''));
    if (!isNaN(pts)) { pointsSum += pts; pointsCount++; }
  });
  const avgPts = pointsCount ? (pointsSum / pointsCount).toFixed(1) + '%' : '—';

  c.innerHTML = `<div class="dash">
    <div class="dash-hero"><h2>Funded Deals</h2><p>Deals that have closed and funded.</p></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent);">$${Math.round(totalFunded).toLocaleString()}</div><div class="stat-label">Total Funded</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text);">${fundedEntries.length}</div><div class="stat-label">Deals Funded</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--accent);">$${Math.round(totalCommission).toLocaleString()}</div><div class="stat-label">Total Commission</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text);">${avgPts}</div><div class="stat-label">Avg. Points</div></div>
    </div>
    ${fundedEntries.length ? `<div class="section"><div class="section-title">Funded Details</div>
    <table class="dash-table">
      <thead><tr><th>Business</th><th>Lender</th><th>Amount</th><th>Term</th><th>Rate</th><th>Pts</th><th>Commission</th><th>Rep</th></tr></thead>
      <tbody>${fundedEntries.map(f => `<tr onclick="openTab('${f.dealId}')">
        <td class="dt-biz">${esc(f.business)}</td>
        <td style="font-size:12px;">${esc(f.lenderName)}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;">${esc(f.amount)}</td>
        <td style="font-family:var(--mono);font-size:12px;">${esc(f.term)}</td>
        <td style="font-family:var(--mono);font-size:12px;">${esc(f.rate)}</td>
        <td style="font-family:var(--mono);font-size:12px;">${esc(f.points)}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;">${esc(f.commission)}</td>
        <td style="font-size:12px;color:var(--accent);">${esc(f.rep)}</td>
      </tr>`).join('')}</tbody>
    </table></div>` : `<div class="empty-state"><h3>No funded deals yet</h3><p>Right-click a lender and select "Funded" to mark a deal as funded.</p></div>`}
  </div>`;
}

function buildLenderTables(id, d) {
  const container = document.getElementById('lender-container-' + id);
  for (const [risk, list] of Object.entries(LENDERS)) {
    const hdr = document.createElement('div');
    hdr.className = `risk-header ${RISK_CLASS[risk]}`;
    hdr.textContent = risk;
    container.appendChild(hdr);

    const table = document.createElement('table');
    table.className = 'lender-table';
    table.innerHTML = `<thead><tr><th class="col-name">Lender</th><th class="col-email">Email</th><th class="col-exempt">Exemptions</th><th class="col-status">Status / Notes</th></tr></thead>`;
    const tbody = document.createElement('tbody');

    list.forEach((l, i) => {
      const lk = `${risk}-${i}`;
      const tr = document.createElement('tr');
      tr.dataset.lenderKey = lk;
      const state = d.lenderStates?.[lk] || '';
      if (state) tr.classList.add(state);
      const portalBadge = l.portal ? '<span class="portal-badge">PORTAL</span>' : '';
      const emailedList = d.emailedLenders || [];
      const emailedBadge = (!l.portal && emailedList.includes(lk)) ? '<span class="emailed-badge">EMAILED</span>' : '';
      tr.innerHTML = `
        <td class="lender-name" title="${l.name}">${l.name}${portalBadge}${emailedBadge}</td>
        <td class="lender-email">${l.email}</td>
        <td class="lender-exempt">${l.exempt}</td>
        <td><input class="status-input" data-lk="${lk}" placeholder="Enter status..." value="${esc(d.lenders?.[lk]||'')}"></td>`;
      tr.addEventListener('click', (e) => {
        if (e.target.classList.contains('status-input')) return;
        if (tr.classList.contains('approved') || tr.classList.contains('declined') || tr.classList.contains('funded')) return;
        tr.classList.toggle('sent');
        saveDealFromDOM(id);
        renderSidebar();
      });
      tr.addEventListener('contextmenu', (e) => {
        if (e.target.classList.contains('status-input')) return;
        e.preventDefault();
        ctxTarget = { tr, dealId: id };
        const menu = document.getElementById('ctx-menu');
        menu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
        menu.classList.add('show');
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }
}

/* ============================================================
   FILE HANDLING
   ============================================================ */
function setupFileHandling(id) {
  if (!dealFiles[id]) dealFiles[id] = [];
  const dz = document.getElementById('drop-zone-' + id);
  const fi = document.getElementById('file-input-' + id);
  dz.addEventListener('click', () => fi.click());
  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('dragover'); addFiles(id, e.dataTransfer.files); });
  fi.addEventListener('change', (e) => { addFiles(id, e.target.files); });
}

function addFiles(id, files) {
  if (!dealFiles[id]) dealFiles[id] = [];
  Array.from(files).forEach(f => { if (!dealFiles[id].find(x => x.name === f.name)) dealFiles[id].push(f); });
  renderDealFiles(id);
}

function renderDealFiles(id) {
  const fl = document.getElementById('file-list-' + id);
  if (!fl) return;
  const files = dealFiles[id] || [];
  fl.innerHTML = files.map((f, i) => `<div class="file-item"><span>${esc(f.name)}</span><button class="file-remove" onclick="removeFile('${id}',${i})">×</button></div>`).join('');
}

function removeFile(id, idx) {
  dealFiles[id].splice(idx, 1);
  renderDealFiles(id);
}

/* ============================================================
   SAVE / GATHER
   ============================================================ */
function saveDealFromDOM(id) {
  const view = document.querySelector(`.deal-view[data-deal-id="${id}"]`);
  if (!view) return;
  const d = deals[id];
  if (!d) return;

  d.fields = d.fields || {};
  view.querySelectorAll('[data-f]').forEach(el => {
    if (el.dataset.f === '__rep__') d.rep = el.value;
    else d.fields[el.dataset.f] = el.value;
  });

  const court = view.querySelector(`input[name="courts-${id}"]:checked`);
  d.courts = court ? court.value : '';

  d.rev = d.rev || {};
  view.querySelectorAll('[data-rev]').forEach(el => { d.rev[el.dataset.rev] = el.value; });
  view.querySelectorAll('[data-mo]').forEach(el => { d.rev['mo-'+el.dataset.mo] = el.value; });

  // Email fields
  d.emailFields = d.emailFields || {};
  view.querySelectorAll('[data-ef]').forEach(el => { d.emailFields[el.dataset.ef] = el.value; });

  d.lenders = d.lenders || {};
  d.lenderStates = d.lenderStates || {};
  view.querySelectorAll('[data-lk]').forEach(el => { d.lenders[el.dataset.lk] = el.value; });
  view.querySelectorAll('tr[data-lender-key]').forEach(tr => {
    const k = tr.dataset.lenderKey;
    if (tr.classList.contains('funded')) d.lenderStates[k] = 'funded';
    else if (tr.classList.contains('approved')) d.lenderStates[k] = 'approved';
    else if (tr.classList.contains('declined')) d.lenderStates[k] = 'declined';
    else if (tr.classList.contains('sent')) d.lenderStates[k] = 'sent';
    else delete d.lenderStates[k];
  });
  persist();
}

/* ============================================================
   EMAIL SENDING
   ============================================================ */
async function sendToHighlighted(id) {
  saveDealFromDOM(id);
  const d = deals[id];
  if (!d) return;
  d.emailedLenders = d.emailedLenders || [];

  // Gather all lenders flat
  const allLenders = [];
  Object.entries(LENDERS).forEach(([risk, list]) => {
    list.forEach((l, i) => { allLenders.push({ ...l, key: `${risk}-${i}` }); });
  });

  // Gather highlighted (sent) lenders that are NOT portal-only
  const highlightedLenders = [];
  document.querySelectorAll(`[data-deal-id="${id}"] tr.sent[data-lender-key]`).forEach(tr => {
    const lk = tr.dataset.lenderKey;
    const lender = allLenders.find(l => l.key === lk);
    if (lender && !lender.portal && lender.to) highlightedLenders.push(lender);
  });

  if (!highlightedLenders.length) { alert('No emailable lenders highlighted. Click lenders to highlight them yellow, then send.'); return; }

  // Split into new vs already emailed
  const newToSend = highlightedLenders.filter(l => !d.emailedLenders.includes(l.key));
  const alreadyEmailed = highlightedLenders.filter(l => d.emailedLenders.includes(l.key));

  if (!newToSend.length) { alert(`All ${alreadyEmailed.length} highlighted lenders have already been emailed for this deal. Use right-click → Force Re-send to re-send.`); return; }

  // Validate
  const ef = d.emailFields || {};
  const subject = ef.subject || '***New Deal*** - ';
  const status = ef.status || '';
  const businessName = d.fields?.business || '';
  if (!businessName) { alert('Please fill in the Business Name first.'); return; }
  if (!status) { alert('Please fill in the Status field in the Submission Email section.'); return; }

  // Check auth
  const token = await ensureToken();
  if (!token) { alert('Please sign in with Microsoft before sending.'); return; }

  const skipMsg = alreadyEmailed.length ? ` (skipping ${alreadyEmailed.length} already emailed)` : '';
  if (!confirm(`Send ${newToSend.length} emails from ${signedInUser.username}?${skipMsg}`)) return;

  // Build email body
  const industry = d.fields?.industry || '';
  const balances = ef.balances || '';
  const notes = ef.notes || '';
  let body = `***New Deal*** - ${businessName}<br><br>`;
  body += `<b><u>Status:</u></b> ${status}<br><br>`;
  if (industry) body += `<b><u>Industry:</u></b> ${industry}<br><br>`;
  if (balances) body += `<b><u>Current Balances:</u></b><br>${balances.replace(/\n/g,'<br>')}<br><br>`;
  if (notes) body += `<b><u>Notes:</u></b><br>${notes.replace(/\n/g,'<br>')}<br><br>`;
  body += `<br><br>`;
  body += `<span style="font-size:14pt;font-weight:bold;">Gotham Capital</span><br>`;
  body += `<span style="font-size:12pt;font-style:italic;">Submissions</span><br><br>`;
  body += `40 Wall St., New York, NY 10005<br>`;
  body += `gothamcapitalfunding.com<br><br>`;
  body += `<span style="font-size:9pt;font-style:italic;">CONFIDENTIALITY NOTICE: The contents of this email message and any attachments are intended solely for the addressee(s) and may contain confidential and/or privileged information and may be legally protected from disclosure. If you are not the intended recipient of this message or their agent, or if this message has been addressed to you in error, please immediately alert the sender by reply email and then delete this message and any attachments. If you are not the intended recipient, you are hereby notified that any use, dissemination, copying, or storage of this message or its attachments is strictly prohibited. Disclaimer: This e-mail message has been sent to you by an independent contractor of RJ Marketing Group Inc, DBA Gotham Capital. ("GC"). The sender of this message is not authorized to exceed the scope of their authority, in the limited capacity in which they serve as an independent contractor of GC, and any information transmitted by the sender in violation of same, is not endorsed by GC, nor does it reflect the position, statements, or opinions of GC. GC assumes no liability for the contents of this e-mail.</span>`;

  // Prepare attachments once
  const files = dealFiles[id] || [];
  let attachments = [];
  if (files.length) {
    attachments = await Promise.all(files.map(fileToAttachment));
  }

  // Additional CC
  const additionalCC = ef.cc ? ef.cc.split(',').map(e => e.trim()).filter(e => e) : [];

  // Show progress
  const sendBtn = document.getElementById('send-btn-' + id);
  const progressSection = document.getElementById('progress-' + id);
  const pf = document.getElementById('pf-' + id);
  const pt = document.getElementById('pt-' + id);
  const resultsDiv = document.getElementById('send-results-' + id);
  sendBtn.disabled = true;
  progressSection.style.display = 'block';
  resultsDiv.innerHTML = '';

  let success = 0;
  const failed = [];

  for (let i = 0; i < newToSend.length; i++) {
    const lender = newToSend[i];
    const percent = Math.round(((i+1)/newToSend.length)*100);
    pf.style.width = percent + '%';
    pf.textContent = percent + '%';
    pt.textContent = `Sending to ${lender.name}... (${i+1}/${newToSend.length})`;

    const allCC = [...(lender.cc||[]), JASON_EMAIL, ...additionalCC];

    try {
      await sendOneEmail(lender.to, allCC, subject, body, attachments, token);
      success++;
      // Track as emailed
      if (!d.emailedLenders.includes(lender.key)) d.emailedLenders.push(lender.key);
    } catch(err) {
      console.error(`Failed ${lender.name}:`, err);
      if (err.message && err.message.includes('429')) {
        pt.textContent = `Rate limited — retrying ${lender.name}...`;
        await sleep(3000);
        try {
          const freshToken = await ensureToken();
          await sendOneEmail(lender.to, allCC, subject, body, attachments, freshToken || token);
          success++;
          if (!d.emailedLenders.includes(lender.key)) d.emailedLenders.push(lender.key);
        } catch(e2) { failed.push(lender.name); }
      } else if (err.message && err.message.includes('401')) {
        const freshToken = await ensureToken();
        if (freshToken) {
          try {
            await sendOneEmail(lender.to, allCC, subject, body, attachments, freshToken);
            success++;
            if (!d.emailedLenders.includes(lender.key)) d.emailedLenders.push(lender.key);
          } catch(e3) { failed.push(lender.name); }
        } else { failed.push(lender.name); }
      } else {
        failed.push(lender.name);
      }
    }

    if (i < newToSend.length - 1) await sleep(2000);
  }

  // Save emailed lenders list
  persist();

  // Results
  pt.textContent = 'Complete!';
  sendBtn.disabled = false;

  if (failed.length === 0) {
    resultsDiv.innerHTML = `<div class="send-results success">All ${success} emails sent successfully!${skipMsg}</div>`;
  } else {
    resultsDiv.innerHTML = `<div class="send-results partial">Sent ${success} of ${newToSend.length} emails.${skipMsg}<div class="failed-list">Failed: ${failed.join(', ')}</div></div>`;
  }

  // Re-render to show EMAILED badges
  setTimeout(() => {
    progressSection.style.display = 'none';
    pf.style.width = '0%';
    pf.textContent = '0%';
    renderDealView(id);
  }, 3000);
}

async function sendOneEmail(to, cc, subject, body, attachments, token) {
  const message = {
    message: {
      subject: subject,
      body: { contentType: 'HTML', content: body },
      toRecipients: [{ emailAddress: { address: to } }],
      ccRecipients: cc.map(email => ({ emailAddress: { address: email } }))
    }
  };
  if (attachments.length) message.message.attachments = attachments;
  const response = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(message)
  });
  if (!response.ok) {
    throw new Error(`${response.status} - ${response.statusText}`);
  }
}

function fileToAttachment(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve({ '@odata.type': '#microsoft.graph.fileAttachment', name: file.name, contentBytes: reader.result.split(',')[1] });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   CONTEXT MENU
   ============================================================ */
function setLenderState(state) {
  if (!ctxTarget) return;
  const { tr, dealId } = ctxTarget;

  if (state === 'approved') {
    hideCtx();
    showApprovalPopup(tr, dealId);
    return;
  }

  if (state === 'funded') {
    hideCtx();
    showFundedPopup(tr, dealId);
    return;
  }

  tr.classList.remove('sent','approved','declined','funded');
  if (state) tr.classList.add(state);

  // If clearing, also remove approval/funded data
  if (!state) {
    const d = deals[dealId];
    if (d) {
      if (d.approvalData) delete d.approvalData[tr.dataset.lenderKey];
      if (d.fundedData) delete d.fundedData[tr.dataset.lenderKey];
    }
  }

  saveDealFromDOM(dealId);
  renderSidebar();
  hideCtx();
}

function forceResend() {
  if (!ctxTarget) return;
  const { tr, dealId } = ctxTarget;
  const lk = tr.dataset.lenderKey;
  const d = deals[dealId];
  if (d) {
    // Remove from emailedLenders so it gets picked up on next send
    d.emailedLenders = (d.emailedLenders || []).filter(k => k !== lk);
    // Set back to sent state
    tr.classList.remove('approved','declined','funded');
    tr.classList.add('sent');
    saveDealFromDOM(dealId);
    // Re-render to update badge
    renderDealView(dealId);
    toast('Lender marked for re-send');
  }
  hideCtx();
}

      <div class="field"><label>Rate / Factor</label><input id="appr-rate" placeholder="1.35" value="${esc(existing.rate||'')}"></div>

function saveApproval(dealId, lk) {
  const d = deals[dealId];
  if (!d) return;
  d.approvalData = d.approvalData || {};
  d.approvalData[lk] = {
    amount: document.getElementById('appr-amount').value.trim(),
    term: document.getElementById('appr-term').value.trim(),
    rate: document.getElementById('appr-rate').value.trim(),
    payment: document.getElementById('appr-payment').value.trim()

  if (overlay && overlay._tr) {
    overlay._tr.classList.remove('sent','declined');
    overlay._tr.classList.add('approved');
  }

  cancelApproval();
  saveDealFromDOM(dealId);
  renderSidebar();
}

function cancelApproval() {
  const overlay = document.getElementById('approval-overlay');
  if (overlay) overlay.remove();
}

function saveFunded(dealId, lk) {
  const d = deals[dealId];
  if (!d) return;
  d.fundedData = d.fundedData || {};

    amount: document.getElementById('fund-amount').value.trim(),

function cancelFunded() {
  const overlay = document.getElementById('funded-overlay');

}

function hideCtx() { document.getElementById('ctx-menu').classList.remove('show'); ctxTarget = null; }
document.addEventListener('click', (e) => { if (!document.getElementById('ctx-menu').contains(e.target)) hideCtx(); });
document.addEventListener('keydown', (e) => { if (e.key==='Escape') hideCtx(); });

/* ============================================================
   REP MANAGEMENT
   ============================================================ */
function manageReps() {
  const existing = document.getElementById('reps-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'reps-overlay';
  overlay.id = 'reps-overlay';
  overlay.innerHTML = `<div class="reps-box"><h3>Manage Reps</h3><div class="rep-list-manage" id="rep-list-manage">${reps.map((r,i)=>`<div class="rep-row"><span>${esc(r)}</span><button class="btn btn-danger btn-sm" onclick="removeRep(${i})">Remove</button></div>`).join('')}${!reps.length?'<p style="font-size:12px;color:var(--text-muted);padding:10px 0;">No reps added yet.</p>':''}</div><div class="add-rep-row"><input id="new-rep-name" placeholder="Rep name" onkeydown="if(event.key==='Enter')addRep()"><button class="btn btn-primary btn-sm" onclick="addRep()">Add</button></div><div style="margin-top:16px;text-align:right;"><button class="btn" onclick="closeRepsOverlay()">Done</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById('new-rep-name').focus();
}
function addRep() { const input=document.getElementById('new-rep-name'); const name=input.value.trim(); if(!name)return; if(reps.includes(name)){toast('Rep already exists');return;} reps.push(name); persist(); manageReps(); renderRepTabs(); renderSidebar(); if(activeView==='dashboard')renderDashboard(); }
function removeRep(idx) { const name=reps[idx]; if(!confirm(`Remove ${name}?`))return; reps.splice(idx,1); Object.values(deals).forEach(d=>{if(d.rep===name)d.rep='';}); persist(); manageReps(); renderRepTabs(); renderSidebar(); if(activeView==='dashboard')renderDashboard(); }
function closeRepsOverlay() { const o=document.getElementById('reps-overlay'); if(o)o.remove(); }

/* ============================================================
   HELPERS
   ============================================================ */
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'toast error show' : 'toast show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ============================================================
   INIT
   ============================================================ */
loadLocal();
loadFromFirebase(() => {
  renderRepTabs();
  renderSidebar();
  renderTabBar();
  if (activeView === 'funded') renderFundedView();
  else if (activeView !== 'dashboard' && deals[activeView]) renderDealView(activeView);
  else showDashboard();
});

// Real-time Firebase listener
(function startFirebaseListener() {
  if (!firebaseUrl) return;
  const evtSource = new EventSource(firebaseUrl + '/.json?auth=');
  // Use polling as fallback since Firebase REST SSE requires auth for streaming
  setInterval(() => {
    if (!firebaseUrl) return;
    fetch(firebaseUrl + '/deals.json').then(r => r.json()).then(data => {
      if (!data || typeof data !== 'object') return;
      let changed = false;
      // Check for new or updated deals from other users
      Object.keys(data).forEach(k => {
        const remote = JSON.stringify(data[k]);
        const local = JSON.stringify(deals[k]);
        if (remote !== local) { deals[k] = data[k]; changed = true; }
      });
      // Check for deleted deals
      Object.keys(deals).forEach(k => {
        if (!data[k]) { delete deals[k]; changed = true; }
      });
      if (changed) {
        saveLocal();
        renderRepTabs();
        renderSidebar();
        renderTabBar();
        if (activeView === 'dashboard') renderDashboard();
        else if (activeView === 'funded') renderFundedView();
      }
    }).catch(() => {});
    // Also poll reps
    fetch(firebaseUrl + '/reps.json').then(r => r.json()).then(data => {
      if (Array.isArray(data) && JSON.stringify(data) !== JSON.stringify(reps)) {
        reps = data;
        saveLocal();
        renderRepTabs();
        if (activeView === 'dashboard') renderDashboard();
      }
    }).catch(() => {});
  }, 5000); // Poll every 5 seconds
})();
